name: Build VoxCPM.cpp for Windows (CUDA)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.17
        id: cuda-toolkit
        with:
          cuda: '12.2.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev"]'

      # 新增步骤：通过 vcpkg 安装缺失的 nlohmann-json 库
      - name: Install vcpkg dependencies (nlohmann-json)
        run: |
          vcpkg install nlohmann-json:x64-windows
          vcpkg integrate install

      - name: Fix MSVC Flags (Remove Linux-specific compiler flags)
        run: |
          Get-ChildItem -Path . -Recurse -Include CMakeLists.txt, *.cmake | ForEach-Object {
              $content = Get-Content $_.FullName -Raw
              $content = $content -replace '-Wextra', ''
              $content = $content -replace '-Wall', ''
              $content = $content -replace '-Wpedantic', ''
              $content = $content -replace '-Werror', ''
              Set-Content -Path $_.FullName -Value $content
          }

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          # -DCMAKE_CXX_STANDARD=20：强制要求使用 C++20，解决 C7555 错误
          # -DCMAKE_TOOLCHAIN_FILE：告诉 CMake 去哪里找刚才安装的 json 库
          # -DCMAKE_CXX_FLAGS="/D_USE_MATH_DEFINES"：强制暴露 M_PI_2 等数学常量，解决 C2065 错误
          cmake .. -G "Visual Studio 17 2022" -A x64 `
                -DGGML_CUDA=ON `
                -DGGML_NATIVE=OFF `
                -DCMAKE_CXX_STANDARD=20 `
                -DCMAKE_CXX_FLAGS="/D_USE_MATH_DEFINES" `
                -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          
      - name: Build Project
        run: |
          cd build
          cmake --build . --config Release -j 4

      - name: Collect Output Files
        run: |
          mkdir output
          Copy-Item -Path .\build\bin\Release\*.exe -Destination .\output\ -ErrorAction SilentlyContinue
          Copy-Item -Path .\build\bin\Release\*.dll -Destination .\output\ -ErrorAction SilentlyContinue
          Copy-Item -Path .\build\Release\*.exe -Destination .\output\ -ErrorAction SilentlyContinue
          Copy-Item -Path .\build\Release\*.dll -Destination .\output\ -ErrorAction SilentlyContinue

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxCPM-Windows-CUDA-Release
          path: output/
