name: Build VoxCPM.cpp for Windows (CUDA)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.17
        id: cuda-toolkit
        with:
          cuda: '12.2.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev"]'

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Bruteforce Fixes for MSVC
        run: |
          mkdir -p third_party/nlohmann
          Invoke-WebRequest -Uri "https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp" -OutFile "third_party/nlohmann/json.hpp"
          
          Get-ChildItem -Path . -Recurse -Include CMakeLists.txt | ForEach-Object {
              $content = Get-Content $_.FullName -Raw
              $content = $content -replace '-Wextra', ''
              $content = $content -replace '-Wall', ''
              $content = $content -replace '-Wpedantic', ''
              $content = $content -replace '-Werror', ''
              $content = $content -replace 'set\(CMAKE_CXX_STANDARD 11\)', 'set(CMAKE_CXX_STANDARD 20)'
              $content = $content -replace 'set\(CMAKE_CXX_STANDARD 14\)', 'set(CMAKE_CXX_STANDARD 20)'
              $content = $content -replace 'set\(CMAKE_CXX_STANDARD 17\)', 'set(CMAKE_CXX_STANDARD 20)'
              $content = $content + "`nif(MSVC)`n  add_compile_options(/std:c++20 /EHsc /Zc:__cplusplus)`n  include_directories(`"`${CMAKE_SOURCE_DIR}/third_party`")`nendif()`n"
              Set-Content -Path $_.FullName -Value $content
          }
          
          (Get-Content CMakeLists.txt) -replace 'add_subdirectory\(benchmark\)', '# add_subdirectory(benchmark)' | Set-Content CMakeLists.txt
          (Get-Content CMakeLists.txt) -replace 'add_subdirectory\(tests\)', '# add_subdirectory(tests)' | Set-Content CMakeLists.txt

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          # 强制使用静态 CRT (/MT) 避免链接缺失 legacy stdio 函数
          cmake .. -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release `
                -DCMAKE_C_FLAGS_RELEASE="/MT /O2 /Ob2 /DNDEBUG" `
                -DCMAKE_CXX_FLAGS_RELEASE="/MT /O2 /Ob2 /DNDEBUG" `
                -DGGML_CUDA=ON `
                -DCMAKE_CUDA_COMPILER="$env:CUDA_PATH\bin\nvcc.exe" `
                -DCMAKE_CUDA_ARCHITECTURES="75;80;86;90" `
                -DGGML_NATIVE=OFF `
                -DCMAKE_CXX_STANDARD=20 `
                -DCMAKE_CXX_FLAGS="/D_USE_MATH_DEFINES /EHsc /std:c++20" `
                -DBUILD_TESTING=OFF `
                -DBUILD_SHARED_LIBS=OFF `
                -DVOXCPM_BUILD_TESTS=OFF `
                -DVOXCPM_BUILD_BENCHMARKS=OFF `
                -DGGML_BUILD_TESTS=OFF

      - name: Build Project
        run: |
          cd build
          nmake

      # ... 后续步骤保持不变（列表、收集、上传）
