name: Build VoxCPM.cpp for Windows (CUDA)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.17
        id: cuda-toolkit
        with:
          cuda: '12.2.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev"]'

      - name: Fix MSVC Flags (Remove Linux-specific compiler flags)
        run: |
          # 遍历所有 CMake 配置文件，删掉微软 MSVC 不认识的 GCC 专属参数
          Get-ChildItem -Path . -Recurse -Include CMakeLists.txt, *.cmake | ForEach-Object {
              $content = Get-Content $_.FullName -Raw
              $content = $content -replace '-Wextra', ''
              $content = $content -replace '-Wall', ''
              $content = $content -replace '-Wpedantic', ''
              $content = $content -replace '-Werror', ''
              Set-Content -Path $_.FullName -Value $content
          }

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DGGML_CUDA=ON -DGGML_NATIVE=OFF
          
      - name: Build Project
        run: |
          cd build
          cmake --build . --config Release -j 4

      - name: Collect Output Files
        run: |
          mkdir output
          # 收集生成的 .exe 和 .dll
          Copy-Item -Path .\build\bin\Release\*.exe -Destination .\output\ -ErrorAction SilentlyContinue
          Copy-Item -Path .\build\bin\Release\*.dll -Destination .\output\ -ErrorAction SilentlyContinue
          Copy-Item -Path .\build\Release\*.exe -Destination .\output\ -ErrorAction SilentlyContinue
          Copy-Item -Path .\build\Release\*.dll -Destination .\output\ -ErrorAction SilentlyContinue

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxCPM-Windows-CUDA-Release
          path: output/
